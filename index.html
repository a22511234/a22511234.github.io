<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>homework</title>
</head>
<body>

<h4>飲食問卷調查表</h4>
<form method="post"action="" enctype"text/plain">
<fieldset>
<legend>個人資料</legend>
<ol>
	<li>
	姓名:<input type="text" name="subject" autofocus/>
	</li>
	<li>
	請選擇出生區域:
	<select size="1" name="location">
	<option>北部</option>
	<option>中部</option>
	<option>南部</option>
	<option>東部</option>
	<option>離島</option>
	<option>外國人</option>
	</select>
	</li>
	<li>
	性別：
	<input type="radio" name="sex" value="男生" checked />男生 
	<input type="radio" name="sex" value="女生" />女生
	</li>
	<li>
	出生年月日：<input type="date" name="borndate" />	
	</li>
	<li>
	e-mail：<input type="text" name="mail" />
	</li>
</ol>
<input type="reset" value="重寫" />
</fieldset>
<fieldset>
<legend>意見調查</legend>
<ol>
	<li>
	經常外食嗎?
	<input type="radio" name="assist" value="經常" />經常&nbsp;
	<input type="radio" name="assist" value="普通" />普通&nbsp; 
	<input type="radio" name="assist" value="很少" />很少&nbsp;
	</li>
	<li>
	呈上題&nbsp; 一周次數如何?
	<input type="radio" name="assist" value="1-3次" />1-3次&nbsp; 
	<input type="radio" name="assist" value="4-6次" />4-6次&nbsp;
	<input type="radio" name="assist" value="6次以上" />6次以上
	</li>
	<li>
	覺得自己飲食均衡嗎?
	<input type="radio" name="sex" value="yes" />是 
	<input type="radio" name="sex" value="no" />否
	</li>
	<li>
	看看底下這個影片
	<a href="https://youtu.be/1lbXh4d01Fs" target="_blank">按我看影片</a>
	</li>
	<li>
	看完有什麼想法告訴我們<br />
	<textarea rows="3" name="hope" cols="50"></textarea>	
	</li>
</ol>
</fieldset>
<input type="submit" value="送出" />
</form>

</body>
</html>
